site_name: Free PW Notes for GATE
site_description: A comprehensive collection of study materials and notes covering Algorithms, AI, ML, Data Science, and Mathematics for GATE preparation.
site_author: ashutoshroy02
repo_url: https://github.com/ashutoshroy02/free-pw-notes-for-gate
repo_name: ashutoshroy02/free-pw-notes-for-gate

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - 📚 Subject-wise Notes:
    - Algorithms: subjects/algorithms.md
    - Artificial Intelligence: subjects/ai.md
    - Calculus & Optimization: subjects/calculus.md
    - Data Structures: subjects/data-structures.md
    - Database Management: subjects/dbms.md
    - Machine Learning: subjects/ml.md
    - Linear Algebra: subjects/linear-algebra.md
    - Probability & Statistics: subjects/stats.md
    - Python for Data Science: subjects/python.md
    - Aptitude: subjects/aptitude.md
  - 🛠️ Contribution: contribution.md
